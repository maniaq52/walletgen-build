name: Build WalletGen

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup vcpkg
        uses: actions/checkout@v4
        with:
          repository: 'microsoft/vcpkg'
          path: 'vcpkg'

      - name: Bootstrap vcpkg
        run: .\vcpkg\bootstrap-vcpkg.bat

      - name: Install OpenSSL
        run: .\vcpkg\vcpkg install openssl:x64-windows --triplet x64-windows

      - name: Integrate vcpkg
        run: .\vcpkg\vcpkg integrate install

      - name: Build with MSBuild
        run: |
          msbuild CryptoWalletGen.sln /p:Configuration=Release /p:Platform=x64 /p:VcpkgRoot=C:\vcpkg /p:UseEnv=true

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: WalletGen-Release
          path: x64\Release\*.exe
